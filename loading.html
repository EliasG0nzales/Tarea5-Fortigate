<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ServiceGonzales · FirewallOS — Iniciando sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#e8192c; --red-dim:#a0111f; --red-glow:rgba(232,25,44,.35);
  --dark:#050709; --green:#00ff88; --text-dim:#6a7f95;
}
html,body{height:100%;width:100%;background:var(--dark);font-family:"Exo 2",sans-serif;overflow:hidden;}

/* Fondo con scanlines */
body::after{content:"";position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;}

/* Overlay oscuro sobre el video — reducido para ver el video */
body::before{content:"";position:fixed;inset:0;z-index:1;background:rgba(5,7,9,.28);pointer-events:none;}

/* Canvas de fondo */
#bg{position:fixed;inset:0;z-index:0;}

/* Video de fondo */
#bg-video{position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;opacity:1;}

/* Contenedor principal */
.wrap{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:36px;}

/* ── Semicircle spinner (Uiverse.io by Nawsome) ── */
.semicircle,.semicircle div{
  width:170px;height:170px;
  animation:6s rotate141 infinite linear;
  background-repeat:no-repeat;
  border-radius:50%;
  position:relative;
  overflow:hidden;
}
.semicircle div{position:absolute;top:5%;left:5%;width:90%;height:90%;}
.semicircle:before,.semicircle div:before{
  content:'';width:100%;height:50%;display:block;
  background:radial-gradient(transparent,transparent 65%,var(--red) 65%,var(--red));
  background-size:100% 200%;
}
@keyframes rotate141{to{transform:rotate(360deg);}}

/* Anillo pulsante */
.spinner-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.spinner-wrap::before{
  content:'';position:absolute;
  width:196px;height:196px;border-radius:50%;
  border:1px solid rgba(232,25,44,.25);
  box-shadow:0 0 30px rgba(232,25,44,.15),inset 0 0 30px rgba(232,25,44,.08);
  animation:ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{box-shadow:0 0 20px rgba(232,25,44,.15),inset 0 0 20px rgba(232,25,44,.06);}
  50%{box-shadow:0 0 55px rgba(232,25,44,.4),inset 0 0 40px rgba(232,25,44,.18);}
}

/* Texto */
.boot-title{font-family:"Rajdhani",sans-serif;font-size:24px;font-weight:700;color:#fff;letter-spacing:2px;text-align:center;text-shadow:0 0 20px rgba(0,0,0,.9),0 2px 8px rgba(0,0,0,.8);}
.boot-title span{color:var(--red);}
.boot-sub{font-family:"Share Tech Mono",monospace;font-size:11px;color:#c8d4e0;letter-spacing:2px;text-align:center;margin-top:6px;text-shadow:0 1px 6px rgba(0,0,0,.9);}
.boot-status{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--red);letter-spacing:1px;text-align:center;min-height:16px;margin-top:4px;text-shadow:0 0 10px rgba(232,25,44,.6);}

/* Barra de progreso */
.progress-wrap{width:300px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.progress-bar{height:100%;width:0%;background:linear-gradient(to right,var(--red-dim),var(--red));border-radius:2px;box-shadow:0 0 10px var(--red-glow);}

/* Contador */
.boot-timer{font-family:"Share Tech Mono",monospace;font-size:13px;color:#c8d4e0;letter-spacing:2px;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.9);}
.boot-timer span{color:#fff;font-weight:700;}

/* Log de arranque */
.boot-log{
  width:340px;background:rgba(5,7,9,.75);border:1px solid rgba(232,25,44,.25);
  border-radius:8px;padding:10px 14px;font-family:"Share Tech Mono",monospace;
  font-size:9px;line-height:1.7;color:#8ba0b4;max-height:100px;overflow:hidden;
  backdrop-filter:blur(4px);
}
.boot-log .ok{color:var(--green);}
.boot-log .err{color:var(--red);}
.boot-log .info{color:#60a5fa;}
</style>
</head>
<body>
<video id="bg-video" autoplay muted loop playsinline>
  <source src="super-car-rainy-city-neverness-to-everness-moewalls-com.mp4" type="video/mp4">
</video>

<!-- Audio de fondo -->
<audio id="bgAudio" loop>
  <source src="MONTAGEM ESTRELA.mp3" type="audio/mpeg">
</audio>

<!-- Botón de audio flotante -->
<div id="audioBtn" onclick="toggleAudio()" title="Activar música" style="
  position:fixed;bottom:20px;right:20px;z-index:9999;
  width:42px;height:42px;border-radius:50%;
  background:rgba(232,25,44,.15);border:1px solid rgba(232,25,44,.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;backdrop-filter:blur(6px);">
  <svg id="audioIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8192c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
  </svg>
</div>

<div class="wrap">
  <div class="spinner-wrap">
    <div class="semicircle"><div><div><div><div><div><div><div><div></div></div></div></div></div></div></div></div></div>
  </div>

  <div>
    <div class="boot-title"><span>Service</span>Gonzales · FirewallOS</div>
    <div class="boot-sub">INICIALIZANDO SISTEMA DE SEGURIDAD PERIMETRAL</div>
    <div class="boot-status" id="bootStatus">Cargando módulos del kernel...</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;">
    <div class="progress-wrap"><div class="progress-bar" id="bootBar"></div></div>
    <div class="boot-timer">Iniciando en <span id="bootTimer">30</span>s</div>
  </div>

  <div class="boot-log" id="bootLog"></div>
</div>

<script>
/* ── Boot sequence ── */
const DURATION = 30000;

const steps = [
  { pct:0,   msg:'Cargando módulos del kernel...',           log:'[  0.001] FirewallOS v4.2.0 iniciando...' },
  { pct:8,   msg:'Iniciando interfaces de red...',           log:'[  0.842] eth0: wan1 UP — 1Gbps' },
  { pct:16,  msg:'Cargando motor de políticas...',           log:'[  1.203] Cargando 42 políticas activas...' },
  { pct:24,  msg:'Iniciando inspección DPI L7...',           log:'[  2.441] DPI engine: OK — 2,400 apps' },
  { pct:33,  msg:'Cargando 48,320 firmas IPS...',            log:'[  3.887] IPS: 48,320 firmas v2024.04.26' },
  { pct:42,  msg:'Verificando integridad del sistema...',    log:'[  5.102] Checksum OK — sin modificaciones' },
  { pct:50,  msg:'Estableciendo sincronización HA...',       log:'[  6.334] HA: fw-perimetro-02 sincronizado' },
  { pct:60,  msg:'Activando NAT y tablas de ruteo...',       log:'[  8.221] NAT: 24 reglas cargadas' },
  { pct:68,  msg:'Iniciando módulo VPN IPSec...',            log:'[ 10.445] VPN: 3 túneles site-to-site OK' },
  { pct:76,  msg:'Cargando certificados TLS...',             log:'[ 13.002] TLS 1.3: certificados válidos' },
  { pct:84,  msg:'Conectando con SIEM/Syslog...',            log:'[ 16.778] Syslog TLS → 10.10.1.60 OK' },
  { pct:91,  msg:'Verificando licencia Enterprise...',       log:'[ 20.113] Licencia válida hasta 31/12/2026' },
  { pct:97,  msg:'Sistema listo. Iniciando interfaz...',     log:'[ 28.990] FirewallOS OPERATIVO ✔' },
];

const bar    = document.getElementById('bootBar');
const status = document.getElementById('bootStatus');
const timer  = document.getElementById('bootTimer');
const logEl  = document.getElementById('bootLog');

let lastStep = -1;

function addLog(text) {
  const isOk  = text.includes('OK') || text.includes('✔') || text.includes('válid');
  const isErr = text.includes('ERR') || text.includes('FAIL');
  const cls   = isOk ? 'ok' : isErr ? 'err' : 'info';
  const line  = document.createElement('div');
  line.className = cls;
  line.textContent = text;
  logEl.appendChild(line);
  // Mantener solo las últimas 5 líneas visibles
  while (logEl.children.length > 5) logEl.removeChild(logEl.firstChild);
}

const start = Date.now();

function tick() {
  const elapsed = Date.now() - start;
  const pct = Math.min((elapsed / DURATION) * 100, 100);
  const remaining = Math.max(0, Math.ceil((DURATION - elapsed) / 1000));

  bar.style.width = pct + '%';
  timer.textContent = remaining;

  // Mostrar paso correspondiente
  for (let i = steps.length - 1; i >= 0; i--) {
    if (pct >= steps[i].pct && i > lastStep) {
      lastStep = i;
      status.textContent = steps[i].msg;
      addLog(steps[i].log);
      break;
    }
  }

  if (elapsed < DURATION) {
    requestAnimationFrame(tick);
  } else {
    bar.style.width = '100%';
    timer.textContent = '0';
    status.textContent = '✔ Sistema operativo. Acceso concedido.';
    status.style.color = 'var(--green)';
    addLog('[ 30.000] Redirigiendo al panel de control...');
    setTimeout(() => {
      window.location.href = 'firewall-dashboard.html';
    }, 800);
  }
}

requestAnimationFrame(tick);

// Audio de fondo
var _audioPlaying = false;
function toggleAudio() {
  var audio = document.getElementById('bgAudio');
  var icon  = document.getElementById('audioIcon');
  var btn   = document.getElementById('audioBtn');
  if (!audio) return;
  if (_audioPlaying) {
    audio.pause(); _audioPlaying = false;
    sessionStorage.setItem('audioMuted', '1');
    icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
    btn.style.borderColor = 'rgba(232,25,44,.4)'; btn.style.background = 'rgba(232,25,44,.15)';
  } else {
    sessionStorage.removeItem('audioMuted');
    audio.volume = 0.4;
    audio.play().then(function(){
      _audioPlaying = true;
      icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
      btn.style.borderColor = '#e8192c'; btn.style.background = 'rgba(232,25,44,.25)';
    }).catch(function(){});
  }
}

// Guardar posición antes de salir
window.addEventListener('beforeunload', function(){
  var audio = document.getElementById('bgAudio');
  if (audio) sessionStorage.setItem('audioTime', audio.currentTime);
});

// Iniciar audio restaurando posición
(function(){
  var audio = document.getElementById('bgAudio');
  if (!audio) return;
  var savedTime = parseFloat(sessionStorage.getItem('audioTime') || '0');
  var muted = sessionStorage.getItem('audioMuted') === '1';
  if (savedTime > 0) audio.currentTime = savedTime;
  audio.volume = 0.4;
  if (muted) return;
  audio.play().then(function(){
    _audioPlaying = true;
    var icon = document.getElementById('audioIcon');
    var btn  = document.getElementById('audioBtn');
    if (icon) icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
    if (btn)  { btn.style.borderColor = '#e8192c'; btn.style.background = 'rgba(232,25,44,.25)'; }
  }).catch(function(){});
})();
</script>
</body>
</html>
